<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MuscleSpoon — Architecture &amp; Flows</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111119;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.08);
    --text: #e4e4e7;
    --muted: #71717a;
    --dim: #3f3f46;
    --highlight: #eab308;
    --highlight-bg: rgba(234,179,8,0.08);
    --highlight-border: rgba(234,179,8,0.4);
    --node-actor: #4ade80;
    --node-client: #38bdf8;
    --node-auth: #a78bfa;
    --node-service: #818cf8;
    --node-data: #f97316;
    --node-infra: #eab308;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; overflow: hidden; }

  /* ── Header ── */
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 6px; }
  header h1 span { color: var(--highlight); }
  header p { color: var(--muted); font-size: 0.92rem; line-height: 1.5; max-width: 800px; }
  header p strong { color: var(--text); }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 24px; flex-wrap: wrap;
    padding: 12px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(17,17,25,0.7);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* ── Main Layout ── */
  .layout { display: flex; height: calc(100vh - 115px); }

  /* ── Diagram Panel ── */
  .diagram-panel { flex: 1; overflow: auto; padding: 30px 30px 60px; position: relative; }
  .col-headers {
    display: flex; gap: 0; margin-bottom: 16px;
    position: sticky; top: 0; z-index: 5;
  }
  .col-header {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--dim); padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .diagram-container { position: relative; }
  .diagram-container svg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
  }

  /* ── Nodes ── */
  .node {
    position: absolute; z-index: 2;
    padding: 9px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    border-left: 3px solid var(--type-color);
    cursor: default;
    transition: opacity 0.3s, border-color 0.3s, box-shadow 0.3s;
    min-width: 0;
  }
  .node-label { font-weight: 700; font-size: 0.82rem; color: var(--text); white-space: nowrap; }
  .node-sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; white-space: nowrap; line-height: 1.4; }
  .node.active {
    border-left-color: var(--highlight) !important;
    border-color: var(--highlight-border);
    box-shadow: 0 0 16px rgba(234,179,8,0.2), inset 0 0 20px rgba(234,179,8,0.03);
  }
  .node.active .node-label { color: #fef3c7; }
  .node.dimmed { opacity: 0.15; }

  /* ── Sidebar ── */
  .sidebar {
    width: 370px; min-width: 370px;
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  /* ── Flows Panel ── */
  .flows-panel { flex: 0 0 auto; max-height: 50%; overflow-y: auto; border-bottom: 1px solid var(--border); }
  .panel-title {
    font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); padding: 18px 20px 10px; position: sticky; top: 0; background: var(--surface); z-index: 2;
  }
  .flow-item {
    padding: 10px 20px;
    border-left: 3px solid transparent;
    cursor: pointer; transition: all 0.15s;
  }
  .flow-item:hover { background: rgba(255,255,255,0.03); }
  .flow-item.active { background: var(--highlight-bg); border-left-color: var(--highlight); }
  .flow-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .flow-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--dim); color: var(--muted);
    font-weight: 800; font-size: 0.72rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .flow-item.active .flow-num { background: var(--highlight); color: #000; }
  .flow-title { font-weight: 700; font-size: 0.88rem; color: var(--text); }
  .flow-item.active .flow-title { color: #fef3c7; }
  .flow-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.4; padding-left: 28px; }
  .clear-btn {
    display: block; width: calc(100% - 40px); margin: 10px 20px 14px;
    padding: 8px; border-radius: 6px; font-size: 0.82rem;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .clear-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }

  /* ── Steps Panel ── */
  .steps-panel { flex: 1; overflow-y: auto; }
  .step { display: flex; gap: 14px; padding: 12px 20px; }
  .step-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--highlight); color: #000;
    font-weight: 800; font-size: 0.78rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
  }
  .step-path {
    font-family: 'Fira Code', monospace; font-size: 0.78rem; font-weight: 600;
    color: var(--highlight); margin-bottom: 4px;
  }
  .step-text { font-size: 0.85rem; color: var(--muted); line-height: 1.55; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* ── SVG paths ── */
  .conn-base { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 1.2; }
  .conn-active { fill: none; stroke: var(--highlight); stroke-width: 2.2; filter: drop-shadow(0 0 4px rgba(234,179,8,0.35)); }
  .conn-active-back { fill: none; stroke: var(--highlight); stroke-width: 1.8; stroke-dasharray: 6,4; filter: drop-shadow(0 0 3px rgba(234,179,8,0.25)); }

  @media (max-width: 1200px) {
    .sidebar { width: 320px; min-width: 320px; }
  }
  @media (max-width: 900px) {
    .layout { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: 100%; max-height: 50vh; }
    .diagram-panel { min-height: 500px; }
    body { overflow: auto; }
  }
</style>
</head>

<header>

</header>

// ─────────────────────────── STATE ───────────────────────────
let activeFlowId = FLOWS[0].id;

// ─────────────────────────── INIT ───────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderLegend();
  renderColHeaders();
  renderNodes();
  renderFlowsList();
  selectFlow(FLOWS[0].id);
});

// ─────────────────────────── LEGEND ───────────────────────────
function renderLegend() {
  const el = document.getElementById('legend');
  const colors = ['#4ade80','#38bdf8','#a78bfa','#818cf8','#f97316','#eab308'];
  const labels = ['Actor','Client surface','Auth / Middleware','API Service','Data layer','Infrastructure'];
  el.innerHTML = labels.map((l, i) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${colors[i]}"></div>${l}</div>`
  ).join('');
}

// ─────────────────────────── COLUMN HEADERS ───────────────────────────
function renderColHeaders() {
  const el = document.getElementById('colHeaders');
  el.innerHTML = COLUMNS.map((c, i) =>
    `<div class="col-header" style="width:${L.colW[i]}px; margin-left:${i === 0 ? L.colX[0] : L.colX[i] - L.colX[i-1] - L.colW[i-1]}px">${c.label}</div>`
  ).join('');
}

// ─────────────────────────── NODES ───────────────────────────
function renderNodes() {
  const container = document.getElementById('diagram');
  const colors = ['var(--node-actor)','var(--node-client)','var(--node-auth)','var(--node-service)','var(--node-data)','var(--node-infra)'];
  
  let maxY = 0;
  NODES.forEach(n => {
    const x = L.colX[n.col];
    const y = L.rowStart + n.row * L.rowStep;
    const color = colors[n.col];
    const nodeEl = document.createElement('div');
    nodeEl.className = 'node';
    nodeEl.id = 'node-' + n.id;
    nodeEl.style.cssText = `left:${x}px; top:${y}px; width:${L.nodeW}px; --type-color:${color}; border-left-color:${color};`;
    nodeEl.innerHTML = `<div class="node-label">${n.label}</div><div class="node-sub">${n.sub.replace(/\n/g,'<br>')}</div>`;
    container.appendChild(nodeEl);
    const bottom = y + L.nodeH + 60;
    if (bottom > maxY) maxY = bottom;
  });
  
  container.style.width = DIAGRAM_W + 'px';
  container.style.height = maxY + 'px';
  const svg = document.getElementById('svgLayer');
  svg.setAttribute('viewBox', `0 0 ${DIAGRAM_W} ${maxY}`);
  svg.style.width = DIAGRAM_W + 'px';
  svg.style.height = maxY + 'px';
}

// ─────────────────────────── FLOWS LIST ───────────────────────────
function renderFlowsList() {
  const panel = document.getElementById('flowsPanel');
  FLOWS.forEach(f => {
    const div = document.createElement('div');
    div.className = 'flow-item';
    div.id = 'flow-' + f.id;
    const idx = FLOWS.indexOf(f) + 1;
    div.innerHTML = `<div class="flow-header"><div class="flow-num">${idx}</div><div class="flow-title">${f.title}</div></div><div class="flow-desc">${f.desc}</div>`;
    div.onclick = () => selectFlow(f.id);
    panel.appendChild(div);
  });
  const btn = document.createElement('button');
  btn.className = 'clear-btn';
  btn.textContent = 'Clear selection';
  btn.onclick = () => clearSelection();
  panel.appendChild(btn);
}

// ─────────────────────────── SELECT FLOW ───────────────────────────
function selectFlow(flowId) {
  activeFlowId = flowId;
  const flow = FLOWS.find(f => f.id === flowId);
  
  // Update flow list items
  document.querySelectorAll('.flow-item').forEach(el => el.classList.remove('active'));
  document.getElementById('flow-' + flowId).classList.add('active');
  
  // Update nodes
  NODES.forEach(n => {
    const el = document.getElementById('node-' + n.id);
    el.classList.remove('active', 'dimmed');
    if (flow.nodes.includes(n.id)) {
      el.classList.add('active');
    } else {
      el.classList.add('dimmed');
    }
  });
  
  // Draw connections
  drawConnections(flow);
  
  // Render steps
  renderSteps(flow);
}

function clearSelection() {
  activeFlowId = null;
  document.querySelectorAll('.flow-item').forEach(el => el.classList.remove('active'));
  NODES.forEach(n => {
    const el = document.getElementById('node-' + n.id);
    el.classList.remove('active', 'dimmed');
  });
  drawConnections(null);
  document.getElementById('stepsPanel').innerHTML = '<div class="panel-title">STEPS</div><div style="padding:20px;color:var(--muted);font-size:0.9rem;">플로우를 선택하면 단계별 설명이 표시됩니다.</div>';
}

// ─────────────────────────── SVG CONNECTIONS ───────────────────────────
function getAnchor(nodeId, side) {
  const n = NODES_MAP[nodeId];
  const x = L.colX[n.col];
  const y = L.rowStart + n.row * L.rowStep;
  switch (side) {
    case 'right':  return { x: x + L.nodeW, y: y + L.nodeH / 2 };
    case 'left':   return { x: x,           y: y + L.nodeH / 2 };
    case 'top':    return { x: x + L.nodeW / 2, y: y };
    case 'bottom': return { x: x + L.nodeW / 2, y: y + L.nodeH };
  }
}

function makePath(fromId, toId) {
  const from = NODES_MAP[fromId];
  const to = NODES_MAP[toId];
  
  if (from.col < to.col) {
    // Forward: right → left
    const s = getAnchor(fromId, 'right');
    const e = getAnchor(toId, 'left');
    const dx = e.x - s.x;
    const cp = Math.max(dx * 0.4, 30);
    return `M${s.x},${s.y} C${s.x + cp},${s.y} ${e.x - cp},${e.y} ${e.x},${e.y}`;
  } else if (from.col > to.col) {
    // Backward: left of source → right of target, arc above
    const s = getAnchor(fromId, 'left');
    const e = getAnchor(toId, 'right');
    const aboveY = Math.min(s.y, e.y) - 35;
    return `M${s.x},${s.y} C${s.x - 35},${aboveY} ${e.x + 35},${aboveY} ${e.x},${e.y}`;
  } else {
    // Same column
    const goingDown = from.row < to.row;
    const s = getAnchor(fromId, goingDown ? 'bottom' : 'top');
    const e = getAnchor(toId, goingDown ? 'top' : 'bottom');
    const midY = (s.y + e.y) / 2;
    return `M${s.x},${s.y} C${s.x},${midY} ${e.x},${midY} ${e.x},${e.y}`;
  }
}

function drawConnections(flow) {
  const svg = document.getElementById('svgLayer');
  svg.innerHTML = '';
  
  // 1) Draw ALL base connections (very faint)
  BASE_CONNS.forEach(([f, t]) => {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', makePath(f, t));
    const isBack = NODES_MAP[f].col > NODES_MAP[t].col;
    path.setAttribute('class', 'conn-base');
    if (isBack) path.setAttribute('stroke-dasharray', '4,3');
    svg.appendChild(path);
  });
  
  // 2) Draw active flow connections on top
  if (flow) {
    const activePaths = [];
    flow.conns.forEach(([f, t]) => {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', makePath(f, t));
      const isBack = NODES_MAP[f].col > NODES_MAP[t].col;
      path.setAttribute('class', isBack ? 'conn-active-back' : 'conn-active');
      svg.appendChild(path);
      activePaths.push(path);

      const len = path.getTotalLength();
      path.style.strokeDasharray = len;
      path.style.strokeDashoffset = len;
      path.style.animation = `dash 0.8s ease forwards`;
    });

    // Add arrowheads to active connections
    flow.conns.forEach(([f, t]) => {
      const to = NODES_MAP[t];
      const from = NODES_MAP[f];
      let anchor;
      if (from.col < to.col) anchor = getAnchor(t, 'left');
      else if (from.col > to.col) anchor = getAnchor(t, 'right');
      else anchor = getAnchor(t, from.row < to.row ? 'top' : 'bottom');

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', anchor.x);
      circle.setAttribute('cy', anchor.y);
      circle.setAttribute('r', '4');
      circle.setAttribute('fill', 'var(--highlight)');
      circle.style.filter = 'drop-shadow(0 0 4px rgba(234,179,8,0.5))';
      svg.appendChild(circle);
    });

    // Add step number badges at midpoint of each active path
    activePaths.forEach((path, idx) => {
      const len = path.getTotalLength();
      const mid = path.getPointAtLength(len / 2);

      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      bg.setAttribute('cx', mid.x);
      bg.setAttribute('cy', mid.y);
      bg.setAttribute('r', '11');
      bg.setAttribute('fill', 'var(--highlight)');
      bg.setAttribute('stroke', 'var(--bg)');
      bg.setAttribute('stroke-width', '2');
      bg.style.filter = 'drop-shadow(0 0 5px rgba(234,179,8,0.6))';
      svg.appendChild(bg);

      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', mid.x);
      label.setAttribute('y', mid.y);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('dominant-baseline', 'central');
      label.setAttribute('fill', '#000');
      label.setAttribute('font-weight', '800');
      label.setAttribute('font-size', '10');
      label.setAttribute('font-family', 'Inter, sans-serif');
      label.setAttribute('pointer-events', 'none');
      label.textContent = idx + 1;
      svg.appendChild(label);
    });
  }
  
  // Add CSS animation
  if (!document.getElementById('dash-anim')) {
    const style = document.createElement('style');
    style.id = 'dash-anim';
    style.textContent = `@keyframes dash { to { stroke-dashoffset: 0; } }`;
    document.head.appendChild(style);
  }
}

// ─────────────────────────── STEPS ───────────────────────────
function renderSteps(flow) {
  const panel = document.getElementById('stepsPanel');
  panel.innerHTML = '<div class="panel-title">STEPS</div>';
  flow.steps.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = `
      <div class="step-num">${i + 1}</div>
      <div>
        <div class="step-path">${s.path}</div>
        <div class="step-text">${s.text}</div>
      </div>
    `;
    panel.appendChild(div);
  });
}
